<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================= -->
    <!-- INTRO -->
    <!-- ========================= -->

    <section id="intro">

        <div class="stars"></div>

        <div class="intro-content">

            <p class="small-text">
                Untuk seseorang yang paling spesial ❤️
            </p>

            <h1>
                Aku punya hadiah kecil untukmu...
            </h1>

            <p class="subtitle">
                Semoga kamu menyukainya ✨
            </p>

        </div>

    </section>

    <!-- ========================= -->
    <!-- CURTAIN -->
    <!-- ========================= -->

    <div id="curtain">

        <div class="curtain leftCurtain">
            <div class="fabric"></div>
        </div>

        <div class="curtain rightCurtain">
            <div class="fabric"></div>
        </div>

    </div>

    <!-- ========================= -->
    <!-- BIRTHDAY -->
    <!-- ========================= -->

    <section id="birthday">

        <!-- Background Effect -->

        <div id="sparkles"></div>

        <div id="petals"></div>

        <div id="balloons"></div>

        <div id="confetti"></div>

        <!-- Hero -->

        <div class="hero">

            <div class="birthday-card">

                <h3 id="birthdayTitle"></h3>

                <h1 id="birthdayName"></h1>

                <p id="birthdayText"></p>

            </div>

        </div>
<div id="cakeScene">

    <h2>🎂 给我的宝贝生日蛋糕 ❤️</h2>

    <p class="cake-subtitle">
        先许个愿吧，然后再吹蜡烛，嘻嘻～
亲爱的，点击火焰，小火苗就会熄灭哦。 ✨
生日快乐呀，我的女朋友、我的挚爱、我的未来——思思。 ❤️
    </p>

    <div class="cake">

        <div class="cake-top"></div>

        <div class="cake-body"></div>

        <div class="candle candle-left">

            <span class="number">2</span>

            <div class="flame" id="flame1"></div>

        </div>

        <div class="candle candle-right">

            <span class="number">2</span>

            <div class="flame" id="flame2"></div>

        </div>

    </div>

</div>
        <!-- Letter -->

        <section class="letter-section">

            <button id="openLetter">

                💌 点击这里 宝宝 ❤️

            </button>

            <div class="letter">

                <div class="letter-title">

                    💌 💌 写给我最爱的女朋友思思的一封信 ❤️

                </div>

                <div
                    class="letter-content"
                    id="letterContent">

                </div>

            </div>

        </section>

    </section>

    <!-- ========================= -->
    <!-- AUDIO -->
    <!-- ========================= -->
<audio id="songVoice">
    <source src="audio/ucapan.mp3" type="audio/mpeg">
</audio>
    <audio id="voiceIntro" preload="auto">

        <source src="audio/intro.mp3" type="audio/mpeg">

    </audio>

    <audio id="voiceLetter" preload="auto">

        <source src="audio/letter.mp3" type="audio/mpeg">

    </audio>
<audio id="bgMusic" loop autoplay>
    <source src="audio/background.mp3" type="audio/mpeg">
</audio>
    <script src="script.js"></script>

</body>

</html>
